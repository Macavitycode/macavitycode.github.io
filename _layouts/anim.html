<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
    
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
      
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
  {%- include google-analytics.html -%}
  {%- endif -%}

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.5.6/addons/p5.dom.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/9.2.0/math.js"></script>
  <script src="/assets/js/base_functions.js"></script>
</head>

<body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        
        <article class="post">
          <header class="post-header">
            <h1 class="post-title">{{ page.title | escape }}</h1>
          </header>
        
          <div class="post-content">
            {{ content }}
          </div>
        
        </article>
        <div id="sketch-holder" class="p5Canvas">
          <script src={{ page.script }}></script>
        </div>
  
      </div>
    </main>

  </body>

</html>
