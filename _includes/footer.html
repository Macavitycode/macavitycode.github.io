<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <div class="wrapper">

    <div class="footer-col-wrapper">
      <div class="footer-col">
        <ul class="contact-list">
            <li class="p-name">{{ site.data.author.name | escape }}</li>
            <li><a class="u-email" href="{{ site.data.author.email1.href }}{{ site.data.author.email1.id }}">
                    <img src="{{ site.data.author.email1.fa-icon }}" width=18/> {{ site.data.author.email1.id }}</a></li>
            <li><a class="u-email" href="{{ site.data.author.email2.href }}{{ site.data.author.email2.id }}">
                    <img src="{{ site.data.author.email2.fa-icon }}" width=18/> {{ site.data.author.email2.id }}</a></li>
            <li><a class="u-email" href="{{ site.data.author.github.href }}{{ site.data.author.github.id }}">
                    <img src="{{ site.data.author.github.fa-icon }}" width=18/> {{ site.data.author.github.id }}</a></li>
            <li><a class="u-email" href="{{ site.data.author.linkedin.href }}{{ site.data.author.linkedin.id }}">
                    <img src="{{ site.data.author.linkedin.fa-icon }}" width=18/> {{ site.data.author.linkedin.id }}</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <p>{{ site.description | escape }}</p>
      </div>
    </div>

    <div class="social-links">
    </div>

  </div>

</footer>
